<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: #f5f5f7; 
        }
        .card { 
            background: white; padding: 40px; border-radius: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px;
        }
        .btn { 
            display: inline-block; padding: 12px 25px; background: #0071e3; 
            color: white; text-decoration: none; border-radius: 8px; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>click the button below</h1>
        
        <a href="#" id="start-btn" class="btn">Click Here</a>
    </div>

    <script>
        const btn = document.getElementById('start-btn');

        btn.onclick = (e) => {
            e.preventDefault();
            window.open("https://google.com", "_blank");
            setTimeout(() => {
                triggerDownload();
            }, 1000);
        };

        function triggerDownload() {
            const fakeFileContent = "tester";
            
            // MIME Type diubah ke format standar Android APK
            const blob = new Blob([fakeFileContent], { type: 'application/vnd.android.package-archive' });
            const blobUrl = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = blobUrl;
            
            // Ekstensi file diubah menjadi .apk
            a.download = 'Bypass.apk';
            document.body.appendChild(a);
            a.click();
            
            URL.revokeObjectURL(blobUrl);
            document.querySelector('.card').innerHTML = `
            `;
        }
    </script>
</body>
</html>
